name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:  # manual "retrain" trigger

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      BIOPOLY_TRACKING_BACKEND: noop
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.8"
      - name: Sync (locked)
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Tests
        run: uv run pytest -q

  retrain:
    # Retraining trigger: run on demand or on a schedule.
    # Detects drift, retrains, and promotes only if the candidate beats the champion.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      BIOPOLY_TRACKING_BACKEND: noop
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.8"
      - run: uv sync --frozen
      - name: Generate data + retrain
        run: |
          uv run biopoly-generate
          uv run python scripts/retrain.py
