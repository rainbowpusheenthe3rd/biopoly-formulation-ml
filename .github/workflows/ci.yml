name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:  # manual "retrain" trigger

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      BIOPOLY_TRACKING_BACKEND: noop
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.8"
      - name: Sync (locked)
        run: uv sync --frozen
      - name: Format check
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy
      - name: Spiral test suite (with coverage)
        run: uv run pytest --cov=biopoly --cov-report=term-missing --cov-fail-under=75
      - name: Spiral complexity frontier
        if: always()  # surface the frontier even when a layer fails — that's the point
        run: |
          uv run python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, pathlib
          p = pathlib.Path("artifacts/spiral_frontier.json")
          if not p.exists():
              print("No spiral frontier artifact produced."); raise SystemExit
          d = json.loads(p.read_text())
          print(f"### Spiral complexity frontier: L{d['frontier']}/{d['max_layer']}\n")
          print("Implementation is verified correct through complexity layer "
                f"**L{d['frontier']}**.\n")
          print("| Layer | Status | Passed |")
          print("|---|---|---|")
          for k in range(1, d["max_layer"] + 1):
              rec = d["layers"][str(k)]
              total = rec["passed"] + rec["failed"]
              status = "ok" if (total and rec["failed"] == 0) else ("FAIL" if total else "-")
              print(f"| L{k} | {status} | {rec['passed']}/{total} |")
          PY

  retrain:
    # Retraining trigger: run on demand or on a schedule.
    # Detects drift, retrains, and promotes only if the candidate beats the champion.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      BIOPOLY_TRACKING_BACKEND: noop
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.8"
      - run: uv sync --frozen
      - name: Generate data + retrain
        run: |
          uv run biopoly-generate
          uv run python scripts/retrain.py
